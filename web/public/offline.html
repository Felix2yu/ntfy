<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <meta name="theme-color" content="#317f6f" />
    <title>ntfy - Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f5f5f5;
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        opacity: 0.6;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 500;
        margin-bottom: 12px;
        color: #222;
      }
      p {
        font-size: 0.95rem;
        color: #666;
        line-height: 1.5;
        margin-bottom: 24px;
      }
      .retry-btn {
        display: inline-block;
        padding: 10px 24px;
        background: #338574;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 0.95rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      .retry-btn:hover {
        background: #2a6e60;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #212121; color: #e0e0e0; }
        h1 { color: #f0f0f0; }
        p { color: #aaa; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: #999;">
        <path d="M1 1l22 22"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
      <h1>You're offline</h1>
      <p>It looks like you've lost your internet connection. ntfy needs a network connection to send and receive notifications.</p>
      <button class="retry-btn" onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
